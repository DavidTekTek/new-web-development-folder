<!DOCTYPE html>
<html>
<head>
    <title>While Loop Activity</title>
</head>
<body>

<h2>While Loop Activity</h2>
<p>Click the button to count from 1 to 10.</p>
<button onclick="countNumbers()">Count</button>
<h3 id="output"></h3>

<script>

function countNumbers(){

    let number = 1;
    let text = "";

    while(number <= 10){

        text += number + "<br>";
        number++;

    }

    document.getElementById("output").innerHTML = text;

}

</script>

</body>
</html>
