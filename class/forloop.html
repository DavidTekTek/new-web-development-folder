<!DOCTYPE html>
<html>

<head>
    <title>For Loop Activity</title>
</head>

<body>

    <h2>For Loop Activity</h2>

    <p>Click the button to display numbers from 1 to 10.</p>
    <button onclick="showNumbers()">Show Numbers</button>
    <h3 id="output"></h3>

    <script>

        function showNumbers() {

            let text = "";

            for (let i = 1; i <= 10; i++) {

                text += i + "<br>";

            }

            document.getElementById("output").innerHTML = text;

        }

    </script>
</body>
</html>
